# Workshop multi-service stack.
# - devshell:  the VS Code container; mounts the repo
# - langflow:  attendee-facing UI on :7860
# - phoenix:   tracing UI on :6006, OTLP collector on :4317
# - keybroker: in-house OpenAI proxy on :8000

services:
  devshell:
    build:
      context: .
      dockerfile: Dockerfile.devshell
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    networks: [summit]
    environment:
      PYTHONUNBUFFERED: "1"

  langflow:
    image: langflowai/langflow:1.9.2   # PIN — verified 2026-05-05; bump after T-14 smoke
    # Run as root so LangFlow can write to its named volume. The image's default
    # uid 1000 user can't write to /app/data because Docker creates named volumes
    # root-owned. Container is isolated; running as root inside is fine here.
    user: root
    ports: ["7860:7860"]
    environment:
      # Single-user dev default (true) lets the build scripts log in as
      # langflow:langflow. Flip to false in .env to enable multi-user mode;
      # then LANGFLOW_SUPERUSER + LANGFLOW_SUPERUSER_PASSWORD must be set
      # and scripts/provision_workshop_users.py creates per-attendee accounts.
      LANGFLOW_AUTO_LOGIN: "${LANGFLOW_AUTO_LOGIN:-true}"
      LANGFLOW_SUPERUSER: "${LANGFLOW_SUPERUSER:-facilitator}"
      LANGFLOW_SUPERUSER_PASSWORD: "${LANGFLOW_SUPERUSER_PASSWORD:-changeme-please}"
      LANGFLOW_NEW_USER_IS_ACTIVE: "true"
      LANGFLOW_DATABASE_URL: "sqlite:////app/data/langflow.db"
      LANGFLOW_COMPONENTS_PATH: "/flows/components"
      OPENAI_BASE_URL: "http://keybroker:8000/v1"
      OPENAI_API_KEY: "${ATTENDEE_BROKER_TOKEN}"
      # LangFlow's image bundles a pre-configured OTEL tracer that auto-
      # instruments its own FastAPI handlers, flooding Phoenix with
      # /events and /health_check polling spans. Disabling the SDK
      # globally stops the noise; we don't rely on Phoenix tracing for
      # the workshop deliverable. Re-enable later if needed.
      OTEL_SDK_DISABLED: "true"
      PYTHONPATH: "/workshop"
    volumes:
      - langflow-data:/app/data
      - ../langflow_flows:/flows:ro
      # Mount the workshop's Python tools and data fixtures so custom components
      # can `import tools.scenario_x.foo` and read data/scenario_x/*.json. Path
      # is the same on local and on Codespaces.
      - ../tools:/workshop/tools:ro
      - ../data:/workshop/data:ro
    depends_on:
      - phoenix
      - keybroker
    networks: [summit]
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:15.3.0   # PIN — verified 2026-05-05; bump after T-14 smoke
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix-data:/data
    networks: [summit]
    restart: unless-stopped

  keybroker:
    build:
      context: ../proxy
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      # Single-key mode (dev): set OPENAI_API_KEY_REAL.
      # Multi-key mode (workshop): set OPENAI_API_KEYS_REAL to ';'-separated list
      # of upstream keys; broker hash-routes each attendee to one of them.
      OPENAI_API_KEY: "${OPENAI_API_KEY_REAL:-}"
      OPENAI_API_KEYS: "${OPENAI_API_KEYS_REAL:-}"
      # Defaults to OpenAI. Override via OPENAI_BASE_URL_REAL Codespaces secret to
      # use a compatible provider, e.g. https://openrouter.ai/api for OpenRouter.
      KEYBROKER_OPENAI_BASE_URL: "${OPENAI_BASE_URL_REAL:-https://api.openai.com}"
      KEYBROKER_TOKENS_FILE: "/etc/keybroker/tokens.json"
      KEYBROKER_DAILY_USD_LIMIT: "${KEYBROKER_DAILY_USD_LIMIT:-5.00}"
      KEYBROKER_TPM_LIMIT: "${KEYBROKER_TPM_LIMIT:-30000}"
      # Global pool cap (workshop budget hard cap). 0 = disabled. Default $100.
      KEYBROKER_GLOBAL_DAILY_USD_LIMIT: "${KEYBROKER_GLOBAL_DAILY_USD_LIMIT:-100.00}"
      # Per-request output cap. Clamps any max_tokens > this before forwarding.
      KEYBROKER_MAX_OUTPUT_TOKENS_CEILING: "${KEYBROKER_MAX_OUTPUT_TOKENS_CEILING:-3000}"
    volumes:
      - ../proxy/tokens.json:/etc/keybroker/tokens.json:ro
    networks: [summit]
    restart: unless-stopped

volumes:
  langflow-data:
  phoenix-data:

networks:
  summit:
    driver: bridge
